<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred - Calendar</title>
    <link rel="stylesheet" href="nav.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #ccc; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; }
        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .month-header h2 { color: #fff; }
        .month-header button { background: #1a1a2e; color: #00ff88; border: 1px solid #333; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .grid .day-label { text-align: center; color: #666; font-size: 0.8rem; padding: 0.5rem; }
        .grid .day { background: #1a1a2e; min-height: 80px; padding: 0.4rem; border-radius: 4px; border: 1px solid #222; }
        .grid .day.today { border-color: #00ff88; }
        .grid .day .num { color: #666; font-size: 0.8rem; }
        .grid .day.today .num { color: #00ff88; font-weight: bold; }
        .grid .day .empty { opacity: 0.3; }
        .no-events { text-align: center; color: #555; margin-top: 2rem; }
        .event { background: rgba(0,255,136,0.1); color: #00ff88; font-size: 0.65rem; padding: 0.1rem 0.3rem; border-radius: 3px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-brand">Alfred</a>
        <a href="/">Home</a>
        <a href="/tasks.html">Tasks</a>
        <a href="/goals.html">Goals</a>
        <a href="/costs.html">Costs</a>
        <a href="/pipeline.html">Pipeline</a>
        <a href="/calendar.html" class="active">Calendar</a>
        <a href="/memory.html">Memory</a>
        <a href="/team.html">Team</a>
        <a href="/office.html">Office</a>
    </nav>
    <div class="container">
        <div class="month-header">
            <button onclick="changeMonth(-1)">← Prev</button>
            <h2 id="month-title"></h2>
            <button onclick="changeMonth(1)">Next →</button>
        </div>
        <div class="grid" id="calendar"></div>
        <p class="no-events" id="no-events" style="display:none">No cron jobs configured. Calendar shows the current month.</p>
        <div class="job-list" id="job-list"></div>
    </div>
    <style>
        .event { background: rgba(0,255,136,0.15); color: #00ff88; font-size: 0.7rem; padding: 2px 4px; border-radius: 3px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; border-left: 2px solid #00ff88; }
        .event.disabled { background: rgba(255,170,0,0.1); color: #ffaa00; border-left-color: #ffaa00; }
        .event.recurring { border-left-color: #6699ff; }
        .job-list { margin-top: 1.5rem; }
        .job-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0.8rem; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .job-item:last-child { border-bottom: none; }
        .job-name { color: #fff; font-weight: 500; }
        .job-meta { color: #888; font-size: 0.8rem; }
        .job-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; }
        .job-badge.enabled { background: rgba(0,255,136,0.15); color: #00ff88; }
        .job-badge.off { background: rgba(255,68,68,0.15); color: #ff4444; }
    </style>
    <script>
        let currentDate = new Date();
        let cronJobs = [];

        function parseCronExpr(expr) {
            // Returns { minutes, hours, daysOfMonth, months, daysOfWeek } as arrays or null (= any)
            const parts = expr.trim().split(/\s+/);
            if (parts.length < 5) return null;
            const parse = (s, max) => { if (s === '*') return null; return s.split(',').map(Number).filter(n => !isNaN(n)); };
            return { minutes: parse(parts[0]), hours: parse(parts[1]), daysOfMonth: parse(parts[2]), months: parse(parts[3]), daysOfWeek: parse(parts[4]) };
        }

        function jobRunsOnDay(job, year, month, day) {
            const s = job.schedule;
            if (!s) return false;
            if (s.kind === 'at') {
                const d = new Date(s.at);
                return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
            }
            if (s.kind === 'every') return true; // recurring interval runs every day
            if (s.kind === 'cron' && s.expr) {
                const c = parseCronExpr(s.expr);
                if (!c) return false;
                const date = new Date(year, month, day);
                const dow = date.getDay();
                if (c.months && !c.months.includes(month + 1)) return false;
                if (c.daysOfMonth && !c.daysOfMonth.includes(day)) return false;
                if (c.daysOfWeek && !c.daysOfWeek.includes(dow)) return false;
                return true;
            }
            return false;
        }

        function formatSchedule(job) {
            const s = job.schedule;
            if (!s) return '?';
            if (s.kind === 'at') return 'Once: ' + new Date(s.at).toLocaleString();
            if (s.kind === 'every') { const mins = Math.round(s.everyMs / 60000); return mins < 60 ? `Every ${mins}m` : `Every ${Math.round(mins/60)}h`; }
            if (s.kind === 'cron') return s.expr + (s.tz ? ` (${s.tz})` : '');
            return '?';
        }

        function render() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('month-title').textContent = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const cal = document.getElementById('calendar');
            const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            let html = days.map(d => `<div class="day-label">${d}</div>`).join('');
            const first = new Date(year, month, 1).getDay();
            const total = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const enabledJobs = cronJobs.filter(j => j.enabled !== false);
            for (let i = 0; i < first; i++) html += '<div class="day"></div>';
            for (let d = 1; d <= total; d++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
                const dayJobs = enabledJobs.filter(j => jobRunsOnDay(j, year, month, d));
                let events = dayJobs.slice(0, 3).map(j => `<div class="event${j.schedule?.kind==='every'?' recurring':''}" title="${j.name || 'unnamed'} (${j.agent})">${j.name || 'unnamed'}</div>`).join('');
                if (dayJobs.length > 3) events += `<div class="event" style="color:#888">+${dayJobs.length - 3} more</div>`;
                html += `<div class="day${isToday ? ' today' : ''}"><div class="num">${d}</div>${events}</div>`;
            }
            cal.innerHTML = html;

            // Job list below calendar
            let listHtml = '<h3 style="color:#fff;margin-bottom:0.8rem;">All Cron Jobs</h3>';
            cronJobs.forEach(j => {
                const on = j.enabled !== false;
                listHtml += `<div class="job-item"><div><span class="job-name">${j.name || 'unnamed'}</span><div class="job-meta">${j.agent} · ${formatSchedule(j)}</div></div><span class="job-badge ${on ? 'enabled' : 'off'}">${on ? 'Enabled' : 'Disabled'}</span></div>`;
            });
            document.getElementById('job-list').innerHTML = listHtml;

            document.getElementById('no-events').style.display = cronJobs.length === 0 ? '' : 'none';
        }

        function changeMonth(delta) { currentDate.setMonth(currentDate.getMonth() + delta); render(); }

        fetch('/api/calendar').then(r=>r.json()).then(jobs => { cronJobs = jobs; render(); });
    </script>
</body>
</html>
