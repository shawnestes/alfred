<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred - Tasks</title>
    <link rel="stylesheet" href="nav.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #ccc; }
        .board { display: flex; gap: 1.5rem; padding: 2rem; overflow-x: auto; min-height: calc(100vh - 50px); }
        .column { flex: 1; min-width: 280px; background: #1a1a2e; border-radius: 12px; padding: 1rem; border: 1px solid #333; }
        .column h2 { color: #fff; font-size: 1rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #333; display: flex; justify-content: space-between; }
        .column h2 .count { background: #333; color: #00ff88; border-radius: 12px; padding: 0.1rem 0.6rem; font-size: 0.8rem; }
        .card { background: #16213e; border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; border-left: 3px solid #00ff88; }
        .card .title { color: #fff; font-size: 0.95rem; margin-bottom: 0.5rem; }
        .card .meta { font-size: 0.8rem; color: #666; display: flex; gap: 0.8rem; }
        .card .meta .badge { background: rgba(0,255,136,0.1); color: #00ff88; padding: 0.1rem 0.5rem; border-radius: 4px; }
        .card .meta .badge.work { background: rgba(100,149,237,0.1); color: cornflowerblue; }
        .goal-badge { background: rgba(0,255,136,0.1); color: #00ff88; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.7rem; margin-left: 0.5rem; }
        .goal-badge.dearnote { background: rgba(108,92,231,0.1); color: #6c5ce7; }
        .goal-badge.noyoupick { background: rgba(0,184,148,0.1); color: #00b894; }
        .goal-badge.lifescript { background: rgba(116,185,255,0.1); color: #74b9ff; }
        .goal-badge.quickdraw { background: rgba(253,203,110,0.1); color: #fdcb6e; }
        .goal-badge.ghostreel { background: rgba(225,112,85,0.1); color: #e17055; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-brand">Alfred</a>
        <a href="/">Home</a>
        <a href="/tasks.html" class="active">Tasks</a>
        <a href="/goals.html">Goals</a>
        <a href="/costs.html">Costs</a>
        <a href="/pipeline.html">Pipeline</a>
        <a href="/calendar.html">Calendar</a>
        <a href="/memory.html">Memory</a>
        <a href="/team.html">Team</a>
        <a href="/office.html">Office</a>
    </nav>
    <div class="board">
        <div class="column" id="col-backlog"><h2>Backlog <span class="count" id="c-backlog">0</span></h2></div>
        <div class="column" id="col-progress"><h2>In Progress <span class="count" id="c-progress">0</span></h2></div>
        <div class="column" id="col-done"><h2>Done <span class="count" id="c-done">0</span></h2></div>
    </div>
    <script>
        let goalsData = null;
        
        // Load goals first
        fetch('/api/goals').then(r=>r.json()).then(goals => {
            goalsData = goals;
            loadTasks();
        }).catch(() => {
            loadTasks(); // Continue without goals if API fails
        });
        
        function findGoalForTask(taskTitle) {
            if (!goalsData) return null;
            
            for (const goal of goalsData.goals) {
                for (const goalTask of goal.tasks) {
                    if (taskTitle.toLowerCase().includes(goalTask.toLowerCase()) || 
                        goalTask.toLowerCase().includes(taskTitle.toLowerCase())) {
                        return goal;
                    }
                }
            }
            return null;
        }
        
        function loadTasks() {
            fetch('/api/tasks').then(r=>r.json()).then(tasks => {
                const backlog = tasks.filter(t => !t.done);
                const done = tasks.filter(t => t.done);
                document.getElementById('c-backlog').textContent = backlog.length;
                document.getElementById('c-done').textContent = done.length;
                
                const makeCard = t => {
                    const goal = findGoalForTask(t.title);
                    const goalBadge = goal ? 
                        `<span class="goal-badge ${goal.project.toLowerCase()}">Goal: ${goal.title}</span>` : '';
                    return `<div class="card">
                        <div class="title">${t.title}</div>
                        <div class="meta">
                            <span class="badge ${t.source}">${t.source}</span>
                            <span>${t.assignee}</span>
                            ${goalBadge}
                        </div>
                    </div>`;
                };
                
                document.getElementById('col-backlog').innerHTML += backlog.map(makeCard).join('');
                document.getElementById('col-done').innerHTML += done.map(makeCard).join('');
            });
        }
    </script>
</body>
</html>
